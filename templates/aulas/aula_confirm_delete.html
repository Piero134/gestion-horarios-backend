{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg text-center p-4 rounded-4">
                <div class="card-body">
                    <div class="mb-4">
                        <i class="bi bi-slash-circle text-warning display-1"></i>
                    </div>
                    <h3 class="fw-bold text-dark">¿Desactivar aula?</h3>
                    <p class="text-muted mb-4">
                        El aula <strong>"{{ aula.nombre }}"</strong> se marcará como <strong>inactiva</strong>.
                        Ya no aparecerá en la programación de horarios, pero sus registros históricos se mantendrán.
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning btn-lg fw-bold text-white">
                                Confirmar desactivación
                            </button>
                            <a href="{% url 'aula_list' %}" class="btn btn-light border btn-lg">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
